name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - spark-version: '3.5.8'
            scala-version: '2.12.21'
          - spark-version: '3.5.8'
            scala-version: '2.13.18'
          - spark-version: '4.0.2'
            scala-version: '2.13.18'
          - spark-version: '4.1.1'
            scala-version: '2.13.18'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests
        run: sbt ++${{ matrix.scala-version }} -Dspark.version=${{ matrix.spark-version }} test
