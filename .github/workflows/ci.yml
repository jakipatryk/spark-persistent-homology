name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - spark-version: '3.3.0'
            scala-version: '2.12.14'
          - spark-version: '3.3.0'
            scala-version: '2.13.12'
          - spark-version: '3.4.0'
            scala-version: '2.12.14'
          - spark-version: '3.4.0'
            scala-version: '2.13.12'
          - spark-version: '3.5.0'
            scala-version: '2.12.14'
          - spark-version: '3.5.0'
            scala-version: '2.13.12'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '11'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests
        run: sbt ++${{ matrix.scala-version }} -Dspark.version=${{ matrix.spark-version }} test
